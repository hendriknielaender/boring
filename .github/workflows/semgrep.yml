name: Semgrep

permissions:
  contents: read

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config p/default --error
